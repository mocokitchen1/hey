<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Your Order - Mvelase Pinafore Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#B45309',
                        cream: '#FFFBEB',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cream font-sans text-gray-900 min-h-screen flex flex-col">
    <div id="nav-placeholder"></div>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-serif font-bold text-gray-900 mb-8">Review Your Order</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Order Items -->
            <div class="lg:col-span-2 space-y-4">
                <div id="cart-items" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Customer Form -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 sticky top-24">
                    <h2 class="text-lg font-bold text-gray-900 mb-6 border-b pb-4">Customer Details</h2>
                    <form id="checkout-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Full Name</label>
                            <input type="text" id="cust-name" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm p-2 border">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">Phone</label>
                                <input type="tel" id="cust-phone" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm p-2 border">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">Email</label>
                                <input type="email" id="cust-email" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm p-2 border">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Delivery Address</label>
                            <textarea id="cust-address" required rows="3" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm p-2 border"></textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Special Measurements / Notes</label>
                            <textarea id="cust-notes" rows="2" placeholder="e.g. Extra long straps, specific waist size" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm p-2 border"></textarea>
                        </div>
                        
                        <div class="pt-4">
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Delivery Method</label>
                            <div class="space-y-2">
                                <label class="flex items-center space-x-3 p-3 border rounded-md cursor-pointer hover:bg-gray-50">
                                    <input type="radio" name="delivery" value="paxi" checked class="text-primary focus:ring-primary">
                                    <span class="text-sm">Paxi Delivery (R60)</span>
                                </label>
                                <label class="flex items-center space-x-3 p-3 border rounded-md cursor-pointer hover:bg-gray-50">
                                    <input type="radio" name="delivery" value="collection" class="text-primary focus:ring-primary">
                                    <span class="text-sm">In-store Collection (Free)</span>
                                </label>
                            </div>
                        </div>

                        <div class="pt-4">
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Payment Method</label>
                            <div class="space-y-2">
                                <label class="flex items-center space-x-3 p-3 border rounded-md cursor-pointer hover:bg-gray-50">
                                    <input type="radio" name="payment" value="eft" checked class="text-primary focus:ring-primary">
                                    <span class="text-sm font-medium">EFT Bank Transfer</span>
                                </label>
                                <label class="flex items-center space-x-3 p-3 border rounded-md cursor-pointer hover:bg-gray-50">
                                    <input type="radio" name="payment" value="cash" class="text-primary focus:ring-primary">
                                    <span class="text-sm font-medium">Cash on Collection</span>
                                </label>
                            </div>
                        </div>

                        <div id="order-summary" class="mt-6 pt-6 border-t space-y-2">
                            <div class="flex justify-between text-sm">
                                <span>Subtotal</span>
                                <span id="summary-subtotal">R0.00</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span>Delivery</span>
                                <span id="summary-delivery">R60.00</span>
                            </div>
                            <div class="flex justify-between text-lg font-bold text-primary mt-2">
                                <span>Total</span>
                                <span id="summary-total">R60.00</span>
                            </div>
                        </div>

                        <button type="submit" id="submit-order-btn" class="w-full mt-6 flex justify-center py-4 px-4 border border-transparent rounded-md shadow-sm text-white bg-primary hover:bg-amber-800 focus:outline-none font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed">
                            Place Order
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="assets/js/shared.js"></script>
    <script>
        function renderCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="p-8 text-center text-gray-500">
                        <i data-lucide="shopping-cart" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                        Your order is currently empty.
                        <a href="shop.html" class="block mx-auto mt-4 text-primary font-bold hover:underline">Go to Shop</a>
                    </div>
                `;
                lucide.createIcons();
                calculateTotal();
                return;
            }

            let html = '<div class="divide-y divide-gray-100">';
            cart.forEach((item, index) => {
                html += `
                    <div class="p-6 flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="w-16 h-16 bg-amber-50 rounded flex items-center justify-center mr-4">
                                <i data-lucide="${item.name.includes('Premium') ? 'sparkles' : 'shirt'}" class="text-primary w-8 h-8 opacity-50"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-900">${item.name}</h4>
                                <p class="text-xs text-gray-500">${item.size} | ${item.color}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-6">
                            <div class="flex items-center border rounded-md">
                                <button onclick="changeQty(${index}, -1)" class="px-2 py-1 hover:bg-gray-50">-</button>
                                <span class="px-3 py-1 text-sm font-bold">${item.qty}</span>
                                <button onclick="changeQty(${index}, 1)" class="px-2 py-1 hover:bg-gray-50">+</button>
                            </div>
                            <div class="text-right w-20">
                                <p class="text-sm font-bold text-gray-900">R${(item.price * item.qty).toFixed(2)}</p>
                            </div>
                            <button onclick="removeFromCart(${index})" class="text-gray-400 hover:text-red-500">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
            lucide.createIcons();
            calculateTotal();
        }

        function changeQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty < 1) cart[index].qty = 1;
            saveCart();
            renderCart();
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            saveCart();
            renderCart();
            updateCartUI();
        }

        function calculateTotal() {
            let subtotal = 0;
            let basicApronsCount = 0;
            
            cart.forEach(item => {
                if (item.name === 'Basic Apron') {
                    basicApronsCount += item.qty;
                } else {
                    subtotal += item.price * item.qty;
                }
            });

            const bulkSets = Math.floor(basicApronsCount / 10);
            const remainingBasics = basicApronsCount % 10;
            subtotal += (bulkSets * 700) + (remainingBasics * 80);

            const deliveryMethod = document.querySelector('input[name="delivery"]:checked').value;
            const deliveryCost = deliveryMethod === 'paxi' ? 60 : 0;
            const total = subtotal + deliveryCost;

            document.getElementById('summary-subtotal').innerText = `R${subtotal.toFixed(2)}`;
            document.getElementById('summary-delivery').innerText = `R${deliveryCost.toFixed(2)}`;
            document.getElementById('summary-total').innerText = `R${total.toFixed(2)}`;
            
            document.getElementById('submit-order-btn').disabled = cart.length === 0;
        }

        document.querySelectorAll('input[name="delivery"]').forEach(radio => {
            radio.addEventListener('change', calculateTotal);
        });

        document.getElementById('checkout-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const orderId = 'MVE-' + Math.floor(10000 + Math.random() * 90000);
            const orderData = {
                id: orderId,
                customer: {
                    name: document.getElementById('cust-name').value,
                    phone: document.getElementById('cust-phone').value,
                    email: document.getElementById('cust-email').value,
                    address: document.getElementById('cust-address').value,
                    notes: document.getElementById('cust-notes').value,
                },
                items: cart,
                delivery: document.querySelector('input[name="delivery"]:checked').value,
                payment: document.querySelector('input[name="payment"]:checked').value,
                total: document.getElementById('summary-total').innerText,
                status: 'Processing',
                date: new Date().toLocaleDateString(),
            };

            const orders = getOrders();
            orders.push(orderData);
            saveOrders(orders);
            addLog('New Order', `Order ${orderId} placed by ${orderData.customer.name}`, 'success');

            alert(`Order Successful! Order ID: ${orderId}`);
            cart = [];
            saveCart();
            window.location.href = 'index.html';
        });

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
